.candle:after,
.candle:before {
  background: rgba(195, 27, 27, 0.4); /* A soft red/maroon shade */
  content: "";
  position: absolute;
  width: 100%;
  height: 2.22222222px;
}

/* Positioning them differently to create the 'stripe' effect */
.candle:before {
  top: 25%;
}

.candle:after {
  top: 75%;
}
